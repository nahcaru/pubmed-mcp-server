# MCP Registry Security Attestation (Exp 2 PoC + Exp 5 tools-hash extension)
# Injected into each fork by exp5's setup_tools_hash.py. Spec: Vault
# 実験詳細設計.md §Exp 2 / §Exp 5.
#
# Identical to Exp 2's template except for the Exp 5 additions (steps 3b/3c):
# after the scan/SBOM/digest steps — so the scan surface and source digest are
# untouched by server build artifacts — the server is launched over stdio per
# .github/mcp-launch.json, its canonical tools/list hash is computed by
# .github/scripts/mcp_tools_hash.py, and the hash is embedded into the SBOM as
# CycloneDX custom properties (mcp:tools_hash et al.) BEFORE attestation, so
# the signed attestation covers the tools manifest. Launch failure does not
# block the gate: CI capture coverage is itself an Exp 5 result.
name: MCP Registry Security Attestation
on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  id-token: write      # OIDC token issuance
  contents: read
  attestations: write  # GitHub Attestations API

jobs:
  security-scan-and-attest:
    runs-on: ubuntu-latest
    outputs:
      artifact-digest: ${{ steps.hash.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Record scan start
        id: t0
        run: echo "epoch=$(date +%s)" >> "$GITHUB_OUTPUT"

      # 1. SAST: Semgrep. All findings are recorded for FP triage; the gate
      # blocks on ERROR/HIGH/CRITICAL-severity findings only (severity-tuned
      # gate — the strict any-finding gate yields 0/10 passes, kept as the
      # baseline result in data/strict-gate/).
      - name: Run Semgrep (SAST)
        id: semgrep
        continue-on-error: true
        run: |
          pipx install semgrep
          semgrep scan \
            --config p/secrets --config p/python --config p/javascript \
            --config p/owasp-top-ten \
            --json --output semgrep-report.json

      - name: Count Semgrep findings
        id: semgrep_count
        if: always()
        run: |
          python3 - <<'PYEOF' >> "$GITHUB_OUTPUT"
          import json
          try:
              results = json.load(open("semgrep-report.json"))["results"]
              gating = [f for f in results
                        if f["extra"]["severity"] in ("ERROR", "HIGH", "CRITICAL")]
              print(f"findings={len(results)}")
              print(f"gating_findings={len(gating)}")
          except Exception:
              print("findings=-1")
              print("gating_findings=-1")
          PYEOF

      # 2a. SBOM: Trivy (CycloneDX)
      - name: Generate SBOM (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          format: cyclonedx
          output: sbom.cdx.json

      # 2b. SCA gate: Trivy vulnerability scan, HIGH/CRITICAL fail
      - name: Run Trivy (SCA gate)
        id: trivy
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scanners: vuln
          format: json
          output: trivy-report.json
          severity: HIGH,CRITICAL
          exit-code: '1'

      - name: Count Trivy findings
        id: trivy_count
        if: always()
        run: |
          n=$(python3 -c "
          import json
          r = json.load(open('trivy-report.json'))
          print(sum(len(t.get('Vulnerabilities') or []) for t in r.get('Results') or []))
          " 2>/dev/null || echo -1)
          echo "findings=$n" >> "$GITHUB_OUTPUT"

      # 3. Artifact digest (Deployment Gap reference value, Exp 5)
      - name: Compute artifact digest
        id: hash
        run: |
          find . -path ./.git -prune -o -type f \
            \( -name "*.py" -o -name "*.ts" -o -name "*.js" \) -print \
            | sort | xargs -r sha256sum | sha256sum \
            | awk '{print $1}' > artifact.digest
          echo "digest=$(cat artifact.digest)" >> "$GITHUB_OUTPUT"

      # 3b. Exp 5: canonical tools/list hash of the *attested* code. Runs
      # after the digest so npm/uv build artifacts never enter the scans or
      # the source digest. Best-effort (continue-on-error).
      - name: Compute tools hash
        id: tools_hash
        continue-on-error: true
        timeout-minutes: 20
        run: |
          pipx install uv || true
          python3 -m venv /tmp/mcp-hash-env
          /tmp/mcp-hash-env/bin/pip install -q mcp
          /tmp/mcp-hash-env/bin/python .github/scripts/mcp_tools_hash.py \
            --launch .github/mcp-launch.json \
            --output tools-hash.json

      # 3c. Exp 5: embed the hash into the SBOM BEFORE attestation, so the
      # Sigstore bundle (whose subject is the SBOM) covers the tools manifest.
      - name: Embed tools hash in SBOM
        id: sbom_embed
        if: always()
        run: |
          python3 - <<'PYEOF' >> "$GITHUB_OUTPUT"
          import json, os
          hash_val = count = None
          try:
              th = json.load(open("tools-hash.json"))
              hash_val, count = th.get("tools_hash"), th.get("tool_count")
          except Exception:
              pass
          if hash_val and os.path.exists("sbom.cdx.json"):
              sbom = json.load(open("sbom.cdx.json"))
              meta = sbom.setdefault("metadata", {})
              props = [p for p in meta.get("properties") or []
                       if not str(p.get("name", "")).startswith("mcp:")]
              props += [
                  {"name": "mcp:tools_hash", "value": hash_val},
                  {"name": "mcp:tools_count", "value": str(count)},
                  {"name": "mcp:tools_hash_spec",
                   "value": "sha256/json(sort_keys)/name+description+inputSchema"},
              ]
              meta["properties"] = props
              with open("sbom.cdx.json", "w") as f:
                  json.dump(sbom, f, indent=2)
          print(f"tools_hash={hash_val or ''}")
          print(f"tools_count={count if count is not None else -1}")
          PYEOF

      # Gate: no attestation unless Semgrep is clean of ERROR/HIGH/CRITICAL
      # findings AND Trivy found no HIGH/CRITICAL vulnerabilities
      - name: Security gate
        id: gate
        run: |
          echo "semgrep_outcome=${{ steps.semgrep.outcome }} semgrep_gating=${{ steps.semgrep_count.outputs.gating_findings }} trivy=${{ steps.trivy.outcome }}"
          [ "${{ steps.semgrep.outcome }}" = "success" ] \
            && [ "${{ steps.semgrep_count.outputs.gating_findings }}" = "0" ] \
            && [ "${{ steps.trivy.outcome }}" = "success" ]

      # 4. Attestation (GitHub native, Sigstore-signed via Actions OIDC)
      - name: Generate attestation
        id: attest
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: sbom.cdx.json
        # The OIDC token binds automatically:
        #   iss: https://token.actions.githubusercontent.com
        #   job_workflow_ref: <owner>/<repo>/.github/workflows/mcp-registry-attest.yml@<ref>

      - name: Record attestation end
        id: t1
        run: echo "epoch=$(date +%s)" >> "$GITHUB_OUTPUT"

      # 5. Metrics (always uploaded, even when the gate fails)
      - name: Record metrics
        if: always()
        run: |
          python3 - <<'EOF'
          import json, os, time
          out = {
              "repo": os.environ["GITHUB_REPOSITORY"],
              "run_id": os.environ["GITHUB_RUN_ID"],
              "sha": os.environ["GITHUB_SHA"],
              "scan_start_epoch": int("${{ steps.t0.outputs.epoch }}" or 0),
              "attest_end_epoch": int("${{ steps.t1.outputs.epoch }}" or 0),
              "recorded_epoch": int(time.time()),
              "semgrep_outcome": "${{ steps.semgrep.outcome }}",
              "semgrep_findings": int("${{ steps.semgrep_count.outputs.findings }}" or -1),
              "semgrep_gating_findings": int("${{ steps.semgrep_count.outputs.gating_findings }}" or -1),
              "trivy_outcome": "${{ steps.trivy.outcome }}",
              "trivy_findings": int("${{ steps.trivy_count.outputs.findings }}" or -1),
              "gate_passed": "${{ steps.gate.outcome }}" == "success",
              "digest": "${{ steps.hash.outputs.digest }}",
              "sbom_size_bytes": os.path.getsize("sbom.cdx.json") if os.path.exists("sbom.cdx.json") else -1,
              "attestation_bundle_path": "${{ steps.attest.outputs.bundle-path }}",
              "tools_hash_outcome": "${{ steps.tools_hash.outcome }}",
              "tools_hash": "${{ steps.sbom_embed.outputs.tools_hash }}" or None,
              "tools_count": int("${{ steps.sbom_embed.outputs.tools_count }}" or -1),
          }
          try:
              th = json.load(open("tools-hash.json"))
              out["tools_hash_elapsed_s"] = th.get("elapsed_s")
              out["tools_hash_setup_s"] = th.get("setup_elapsed_s")
              out["tools_hash_error"] = th.get("error")
          except Exception:
              pass
          json.dump(out, open("metrics.json", "w"), indent=2)
          EOF
          cat metrics.json

      - name: Copy attestation bundle
        if: steps.attest.outcome == 'success'
        run: cp "${{ steps.attest.outputs.bundle-path }}" attestation.sigstore.json

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcp-registry-attest-results
          path: |
            metrics.json
            sbom.cdx.json
            semgrep-report.json
            trivy-report.json
            artifact.digest
            tools-hash.json
            attestation.sigstore.json
          if-no-files-found: warn
